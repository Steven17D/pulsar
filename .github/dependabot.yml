version: 2
updates:
  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  # Pulsar currently has zero SwiftPM dependencies, so there is nothing
  # for Dependabot to update there. When a dependency is added to
  # Package.swift, enable the block below.
  #
  # - package-ecosystem: swift
  #   directory: /
  #   schedule:
  #     interval: weekly
  #   open-pull-requests-limit: 5
  #   labels:
  #     - dependencies
