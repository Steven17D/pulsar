name: Feature request
description: Propose a new effect, palette, integration, or other enhancement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search
        [existing issues](https://github.com/Steven17D/pulsar/issues)
        and [discussions](https://github.com/Steven17D/pulsar/discussions).
        If a similar idea already exists, react or comment there instead
        of opening a duplicate.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case in concrete terms.
      placeholder: I want Pulsar to react to mic input as well as system output.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change to Pulsar would solve the problem?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fell short.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Pulsar does this touch?
      multiple: true
      options:
        - Audio capture / Process Tap
        - FFT / analyzer
        - Effects
        - Palettes
        - DDP / wire format
        - Per-segment / per-device controls
        - SwiftUI menu-bar panel
        - Config file / persistence
        - Packaging / signing / install
        - Documentation
        - Other
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar features elsewhere.
    validations:
      required: false
