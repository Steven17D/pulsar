name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Validate Package
        run: swift package describe --type json > /dev/null

      - name: Package .app bundle (smoke test)
        run: |
          bash scripts/package.sh
          unzip -l Pulsar.zip
